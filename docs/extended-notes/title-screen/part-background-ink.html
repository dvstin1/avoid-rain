<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title Screen Part - Background & Ink</title>
    <style>
        body { background: #1a1a1a; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .canvas {
            width: 800px;
            height: 450px;
            background: #281e14;
            position: relative;
            overflow: hidden;
            border: 5px solid #000;
        }
        /* Parchment Texture Idea using SVG Filter */
        .parchment {
            position: absolute;
            width: 100%;
            height: 100%;
            background: #3d2d1e;
            filter: url(#noise);
            opacity: 0.3;
        }
        .ink-blot {
            position: absolute;
            fill: #000;
            filter: blur(4px);
            animation: pulse 8s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1) rotate(0deg); opacity: 0.6; }
            50% { transform: scale(1.1) rotate(5deg); opacity: 0.8; }
        }
    </style>
</head>
<body>
    <div class="canvas">
        <div class="parchment"></div>
        <!-- Huge corner blot -->
        <svg class="ink-blot" style="top: -100px; left: -100px; width: 400px; height: 400px;">
            <path d="M200,100 Q250,50 300,100 T350,200 Q400,300 300,400 T100,350 Q50,250 100,150 Z" />
        </svg>
        <!-- Spattered blot -->
        <svg class="ink-blot" style="bottom: 20px; right: 50px; width: 150px; height: 150px; animation-delay: -2s;">
            <circle cx="75" cy="75" r="50" />
            <circle cx="40" cy="40" r="20" />
            <circle cx="110" cy="110" r="30" />
        </svg>
    </div>

    <svg style="display:none;">
        <filter id="noise">
            <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="4" stitchTiles="stitch" />
            <feColorMatrix type="saturate" values="0" />
        </filter>
    </svg>
</body>
</html>
